name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

# Cancel in-flight runs for the same ref (e.g. successive pushes on a PR)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier + eslint + tsc)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci
