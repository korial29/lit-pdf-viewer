name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Prepare www directory
        run: |
          # Copy pdfjs, fonts, and style from assets (same as npm start does)
          cp -r node_modules/pdfjs-dist www/
          cp -r assets/fonts www/
          cp -r assets/style www/style

      - name: Prepare pages content
        run: |
          mkdir -p _site
          # Copy demo files
          cp -r www/* _site/
          # Copy built library (rename from .mjs to .js for browser compatibility)
          cp dist/index.mjs _site/index.js

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r _site/* .
          git add .
          git commit -m "Deploy from master: ${{ github.sha }}"
          git push -f origin gh-pages-new:gh-pages
