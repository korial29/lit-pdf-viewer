name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo with Vite
        run: npm run build:demo

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r dist-demo/www/* .
          cp -r dist-demo/assets .
          cp -r dist-demo/fonts .
          cp -r dist-demo/pdfjs-dist .
          cp -r dist-demo/src .
          cp -r dist-demo/style .
          cp dist-demo/*.pdf .
          git add .
          git commit -m "Deploy from master: ${{ github.sha }}"
          git push -f origin gh-pages-new:gh-pages
